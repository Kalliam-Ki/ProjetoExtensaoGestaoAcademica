# Configuração do Localhost
server.port=8080
server.servlet.context-path=/api

# Configuração do Postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/gestaoacademica
spring.datasource.username=postgres
spring.datasource.password=123


# Configuração do JPA/HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Configuração de Log
    # Configuracao de log para desenvolvimento
    logging.level.br.com.unipar.projeto.extensao.projetoextensaogestaoacademica=DEBUG
    logging.level.org.springframework.web=INFO
    logging.level.org.hibernate.SQL=DEBUG

    # Formato do log
    logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

    # Arquivo de log para controle
    logging.file.name=logs/gestao-academica.log

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

spring.web.resources.add-mappings=false